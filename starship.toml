# Pills

add_newline = true
palette = "frappe"

format = """
[в•­](fg:separator)\
$status\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$time \
${custom.jj_change}\
${custom.jj_desc}\
$line_break\
[в•°](fg:separator)\
$character\
"""

###########################################

[palettes.default]
prompt_ok  = "#a6e3a1" # Green
prompt_err = "#f38ba8" # Red
icon       = "#161514" # Text
separator  = "#585b70" # Overlay1
background = "#1e1e2e" # Base
directory  = "#89b4fa" # Blue
duration   = "#f9e2af" # Yellow
status     = "#f38ba8" # Red
git_branch = "#a6e3a1" # Green
git_status = "#f9e2af" # Yellow

[palettes.frappe]
prompt_ok  = "#a6d189" # Green
prompt_err = "#e78284" # Red
icon       = "#303446" # Base (dark for icon bg)
separator  = "#949cbb" # Overlay1
background = "#303446" # Base
directory  = "#8caaee" # Blue
git_branch = "#a6d189" # Green
git_status  = "#ef9f76" # Peach
duration    = "#f4b8e4" # Pink
time        = "#81c8be" # Teal
status      = "#e78284" # Red

###########################################

[character]
success_symbol = "[вќЇ](fg:prompt_ok)"
error_symbol = "[вќЇ](fg:prompt_err)"

[status]
format = "[в”Ђ](fg:separator)[о‚¶](fg:status)[оЅ¶](fg:icon bg:status)[о‚ґ](fg:status bg:background)[ $status](bg:background)[о‚ґ](fg:background)"
pipestatus = true
pipestatus_separator = "-"
pipestatus_segment_format = "$status"
pipestatus_format = "[в”Ђ](fg:separator)[о‚¶](fg:status)[оЅ¶](fg:icon bg:status)[о‚ґ](fg:status bg:background)[ $pipestatus](bg:background)[о‚ґ](fg:background)"
disabled = false

[directory]
format = "[в”Ђ](fg:separator)[о‚¶](fg:directory)[пЃ»](fg:icon bg:directory)[о‚ґ](fg:directory bg:background)[ $path](bg:background)[о‚ґ](fg:background)"
truncate_to_repo = false
truncation_length = 0

[directory.substitutions]
"Documents" = "у°€™"
"Downloads" = "пЂ™"
"Music" = "у°ќљ"
"Pictures" = "пЂѕ"
"Repos" = "у°І‹"

[git_branch]
format = "[в”Ђ](fg:separator)[о‚¶](fg:git_branch)[о‚ ](fg:icon bg:git_branch)[о‚ґ](fg:git_branch bg:background)[ $branch](bg:background)"

[git_status]
format = "[о‚ґ](fg:background bg:git_status)[$all_status$ahead_behind](fg:icon bg:git_status)[о‚ґ](fg:git_status)"

[cmd_duration]
format = "[в”Ђ](fg:separator)[о‚¶](fg:duration)[у±ђ‹](fg:icon bg:duration)[о‚ґ](fg:duration bg:background)[ $duration](bg:background)[о‚ґ](fg:background)"
min_time = 1000

[time]
# format = "[в”Ђ](fg:separator)[о‚¶](fg:duration)[у°Ґ”](fg:icon bg:duration)[о‚ґ](fg:duration bg:background)[ $time](bg:background)[о‚ґ](fg:background)"
disabled = false
time_format = "%R"  # This displays time in 24-hour format (e.g., 14:30)
format = "[[ п„і $time ](fg:#a0a9cb )]($style)"

[custom.jj_change]
description = "The working copy of the repo in your current directory: workspaces (if relevant), change ID, bookmarks"
command     = ''' jj log --no-graph -r=@ -T='separate(" ", working_copies, change_id.shortest(), bookmarks,)' '''
when        = ''' test -n "$(jj status)" || exit 1 '''
format      = 'on [$symbol ($output)]($style) '
symbol      = 'рџђ¦'
style       = 'bold purple'
ignore_timeout  = true

[custom.jj_desc]
description = "The description of your working copy, if set"
command     = ''' jj log --no-graph -r=@ -T="description.first_line()" | awk '{if(length($0) > 25) {s = substr($0, 1, 25); sub(/[ \t\r\n]+$/, "", s); print s "вЂ¦"} else {print $0}}' '''
when        = ''' test -n "$(jj status)" -a -n "$(jj log --no-graph -r=@ -T='description')" || exit 1 '''
format      = '$symbol [($output)]($style) '
symbol      = '|'
ignore_timeout  = true
